<!DOCTYPE html>

<head>

  <meta name="description" content="Official artist links." />

        </div>
      </div>
    </section>

    <section class="release-section reveal reveal-delay">
      <div class="section-header">
        <span class="section-kicker" id="comingSoonKicker">Coming Soon</span>
        <h2 id="comingSoonHeading">New Release</h2>
      </div>

      <article class="release-card">
        <div class="release-cover-wrap">
          <img id="releaseCover" class="release-cover" src="" alt="Upcoming release cover" />
        </div>
        <div class="release-info">
          <h3 id="releaseTitle">Coming Soon</h3>
          <p id="releaseSubtitle" class="release-subtitle">A new release is on the way.</p>
          <a id="releaseLink" class="listen-button disabled-button" href="#" aria-disabled="true">Stay Tuned</a>
        </div>
      </article>
    </section>

    <section class="music-section reveal reveal-delay-2">
      <div class="section-header">
        <span class="section-kicker">Discography</span>
        <h2>My Musics</h2>
      </div>

      <div id="musicScroller" class="music-scroller" aria-label="My Musics"></div>
    </section>
  </main>

  <script src="content.js"></script>
  <script src="script.js"></script>
</body>
</html>
